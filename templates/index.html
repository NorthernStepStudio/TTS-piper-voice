<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piper TTS Studio</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --surface3: #22222f;
      --border: #2a2a3a;
      --border2: #363648;
      --accent: #7c5cfc;
      --accent2: #9f82ff;
      --accent-glow: rgba(124, 92, 252, 0.25);
      --green: #22d3a5;
      --green-dim: rgba(34, 211, 165, 0.15);
      --red: #f87171;
      --text: #e8e8f0;
      --text2: #9090aa;
      --text3: #5a5a72;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 820px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #b084ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .logo-text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo-text span { color: var(--accent2); }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--surface3);
      border: 1px solid var(--border2);
      color: var(--text2);
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* ── Main layout ── */
    .workspace {
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 0.85rem;
    }

    /* ── Text area ── */
    .text-area-wrap { position: relative; }
    textarea {
      width: 100%;
      min-height: 160px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.65;
      padding: 1rem 1.1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .char-count {
      position: absolute;
      bottom: 0.6rem;
      right: 0.8rem;
      font-size: 0.75rem;
      color: var(--text3);
      pointer-events: none;
    }

    /* ── Quick phrases ── */
    .quick-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.75rem;
    }
    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: var(--surface3);
    }

    /* ── Controls grid ── */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem 1.75rem;
    }
    @media (max-width: 560px) {
      .controls-grid { grid-template-columns: 1fr; }
    }

    .control-item label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }
    .control-item label .val {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent2);
      background: var(--surface3);
      border: 1px solid var(--border2);
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      min-width: 2.5rem;
      text-align: center;
    }

    /* Custom range slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border2);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    input[type=range]:hover::-webkit-slider-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 14px var(--accent-glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }
    .slider-track {
      position: relative;
      padding-bottom: 0.15rem;
    }
    .control-hint {
      font-size: 0.7rem;
      color: var(--text3);
      margin-top: 0.35rem;
    }

    /* ── Action bar ── */
    .action-bar {
      display: flex;
      gap: 0.75rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.7rem 1.4rem;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9a72ff);
      color: #fff;
      flex: 1;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.12);
      box-shadow: 0 6px 28px var(--accent-glow);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      background: var(--surface3);
      color: var(--text3);
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--surface3);
      color: var(--text);
      border-color: var(--accent);
    }
    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Player card ── */
    .player-card {
      display: none;
      border-color: var(--border2);
      background: linear-gradient(135deg, var(--surface) 0%, #141420 100%);
    }
    .player-card.visible { display: block; }

    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .player-info { display: flex; flex-direction: column; gap: 0.2rem; }
    .player-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .player-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .player-meta {
      font-size: 0.72rem;
      color: var(--text3);
    }

    /* Waveform */
    .waveform-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 1rem;
      position: relative;
      height: 72px;
    }
    canvas#waveform {
      display: block;
      width: 100%;
      height: 100%;
    }
    .waveform-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 0%;
      height: 100%;
      background: rgba(124, 92, 252, 0.08);
      border-right: 2px solid var(--accent);
      pointer-events: none;
      transition: width 0.1s linear;
    }

    /* Player controls */
    .player-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .ctrl-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--accent2); }
    .ctrl-btn.play-btn {
      width: 48px; height: 48px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .ctrl-btn.play-btn:hover { filter: brightness(1.15); }

    .time-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }
    input[type=range].seek {
      height: 3px;
      cursor: pointer;
    }
    input[type=range].seek::-webkit-slider-thumb {
      width: 12px; height: 12px;
    }

    .dl-btn {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(34, 211, 165, 0.3);
    }
    .dl-btn:hover {
      background: rgba(34, 211, 165, 0.22);
      border-color: var(--green);
    }

    /* ── Status ── */
    .status-bar {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text3);
      padding: 0.5rem;
      min-height: 1.5rem;
    }
    .status-bar.loading { color: var(--accent2); }
    .status-bar.error { color: var(--red); }
    .status-bar.ok { color: var(--green); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Reset hint ── */
    .reset-link {
      font-size: 0.7rem;
      color: var(--text3);
      cursor: pointer;
      text-decoration: underline dotted;
      margin-left: 0.5rem;
    }
    .reset-link:hover { color: var(--text2); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎙</div>
    <div class="logo-text">Piper <span>TTS</span> Studio</div>
  </div>
  <span class="badge">en-US · Amy</span>
</header>

<div class="workspace">

  <!-- Text input -->
  <div class="card">
    <div class="card-title">Text Input</div>
    <div class="text-area-wrap">
      <textarea id="textInput" placeholder="Type or paste your text here… (Ctrl+Enter to synthesize)"
        oninput="updateCharCount()"></textarea>
      <span class="char-count" id="charCount">0</span>
    </div>
    <div class="quick-wrap">
      <span class="card-title" style="margin-bottom:0;align-self:center">Quick phrases:</span>
      <button class="quick-btn" onclick="setPhrase('Hello! Welcome to Piper TTS Studio.')">👋 Welcome</button>
      <button class="quick-btn" onclick="setPhrase('The quick brown fox jumps over the lazy dog.')">🦊 Pangram</button>
      <button class="quick-btn" onclick="setPhrase('To be or not to be, that is the question.')">📖 Shakespeare</button>
      <button class="quick-btn" onclick="setPhrase('In the beginning, there was silence. Then came the word.')">🌟 Dramatic</button>
      <button class="quick-btn" onclick="setPhrase('One two three four five six seven eight nine ten.')">🔢 Numbers</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="card-title">Voice Controls <span class="reset-link" onclick="resetControls()">reset all</span></div>
    <div class="controls-grid">

      <div class="control-item">
        <label>
          🐢 Speed
          <span class="val" id="speedVal">1.00×</span>
        </label>
        <div class="slider-track">
          <input type="range" id="speed" min="0.25" max="3.0" step="0.05" value="1.0"
            oninput="document.getElementById('speedVal').textContent = (+this.value).toFixed(2)+'×'" />
        </div>
        <div class="control-hint">0.25× (slow) → 3.0× (fast) · default 1.0×</div>
      </div>

      <div class="control-item">
        <label>
          🔊 Volume
          <span class="val" id="volVal">1.00</span>
        </label>
        <div class="slider-track">
          <input type="range" id="volume" min="0.1" max="2.0" step="0.05" value="1.0"
            oninput="document.getElementById('volVal').textContent = (+this.value).toFixed(2)" />
        </div>
        <div class="control-hint">Output gain · 0.1× to 2.0× · default 1.0</div>
      </div>

      <div class="control-item">
        <label>
          🎭 Expressiveness
          <span class="val" id="exprVal">0.67</span>
        </label>
        <div class="slider-track">
          <input type="range" id="expressiveness" min="0" max="2.0" step="0.01" value="0.667"
            oninput="document.getElementById('exprVal').textContent = (+this.value).toFixed(2)" />
        </div>
        <div class="control-hint">Pitch & tone variance · 0 (flat) → 2.0 (expressive)</div>
      </div>

      <div class="control-item">
        <label>
          🌊 Rhythm Variation
          <span class="val" id="varVal">0.80</span>
        </label>
        <div class="slider-track">
          <input type="range" id="variation" min="0" max="2.0" step="0.01" value="0.8"
            oninput="document.getElementById('varVal').textContent = (+this.value).toFixed(2)" />
        </div>
        <div class="control-hint">Prosody randomness · 0 (robotic) → 2.0 (natural)</div>
      </div>

    </div>
  </div>

  <!-- Action -->
  <div class="action-bar">
    <button class="btn btn-primary" id="synthBtn" onclick="synthesize()">
      🎙 Synthesize Speech
    </button>
    <button class="btn btn-secondary" id="regenBtn" style="display:none" onclick="synthesize()">
      🔄 Regenerate
    </button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <!-- Player -->
  <div class="card player-card" id="playerCard">
    <div class="player-top">
      <div class="player-info">
        <div class="player-label">Audio Ready</div>
        <div class="player-meta" id="playerMeta">—</div>
      </div>
      <button class="btn btn-secondary dl-btn" id="dlBtn" onclick="downloadAudio()">
        ⬇ Download WAV
      </button>
    </div>

    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
      <div class="waveform-overlay" id="waveOverlay"></div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" onclick="seek(-5)" title="−5 s">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="seek(5)" title="+5 s">⏭</button>
      <div class="time-bar">
        <input type="range" class="seek" id="seekBar" min="0" max="100" value="0"
          oninput="onSeek(this.value)" />
        <div class="time-labels">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>
    </div>
  </div>

</div>

<audio id="audioEl" style="display:none"></audio>

<script>
  const audioEl = document.getElementById('audioEl');
  let currentBlob = null;
  let currentUrl = null;
  let animFrame = null;

  /* ── Char count ── */
  function updateCharCount() {
    const v = document.getElementById('textInput').value.length;
    document.getElementById('charCount').textContent = v;
  }

  /* ── Quick phrases ── */
  function setPhrase(text) {
    document.getElementById('textInput').value = text;
    updateCharCount();
  }

  /* ── Reset controls ── */
  function resetControls() {
    const defaults = { speed: 1.0, volume: 1.0, expressiveness: 0.667, variation: 0.8 };
    const labels = {
      speed: ['.toFixed(2)', '×', 'speedVal'],
      volume: ['.toFixed(2)', '', 'volVal'],
      expressiveness: ['.toFixed(2)', '', 'exprVal'],
      variation: ['.toFixed(2)', '', 'varVal'],
    };
    for (const [id, val] of Object.entries(defaults)) {
      const el = document.getElementById(id);
      el.value = val;
      const [fmt, suffix, labelId] = labels[id];
      document.getElementById(labelId).textContent = val.toFixed(2) + suffix;
    }
  }

  /* ── Synthesize ── */
  async function synthesize() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) { setStatus('Please enter some text first.', 'error'); return; }

    const synthBtn = document.getElementById('synthBtn');
    const regenBtn = document.getElementById('regenBtn');
    synthBtn.disabled = true;
    regenBtn.disabled = true;
    setStatus('<span class="spinner"></span>Synthesizing speech…', 'loading');
    document.getElementById('playerCard').classList.remove('visible');

    const payload = {
      text,
      speed: +document.getElementById('speed').value,
      volume: +document.getElementById('volume').value,
      expressiveness: +document.getElementById('expressiveness').value,
      variation: +document.getElementById('variation').value,
    };

    try {
      const start = Date.now();
      const res = await fetch('/synthesize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }

      const blob = await res.blob();
      const elapsed = ((Date.now() - start) / 1000).toFixed(1);

      if (currentUrl) URL.revokeObjectURL(currentUrl);
      currentBlob = blob;
      currentUrl = URL.createObjectURL(blob);

      audioEl.src = currentUrl;
      await new Promise(r => { audioEl.onloadedmetadata = r; });

      setupPlayer(elapsed);
      audioEl.play();
      setStatus(`Generated in ${elapsed}s`, 'ok');
      regenBtn.style.display = '';

    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    } finally {
      synthBtn.disabled = false;
      regenBtn.disabled = false;
    }
  }

  /* ── Player setup ── */
  function setupPlayer(elapsed) {
    document.getElementById('playerCard').classList.add('visible');
    const dur = audioEl.duration;
    document.getElementById('timeDuration').textContent = fmt(dur);
    document.getElementById('seekBar').max = dur || 100;
    document.getElementById('playerMeta').textContent =
      `Duration: ${fmt(dur)} · Generated in ${elapsed}s`;

    drawWaveform();
    startProgress();
  }

  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  /* ── Waveform drawing ── */
  async function drawWaveform() {
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;

    const arrayBuf = await currentBlob.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const decoded = await audioCtx.decodeAudioData(arrayBuf);
    const data = decoded.getChannelData(0);
    const w = canvas.width, h = canvas.height;
    const step = Math.ceil(data.length / w);
    const mid = h / 2;

    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(124, 92, 252, 0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < w; i++) {
      let min = 1, max = -1;
      for (let j = 0; j < step; j++) {
        const v = data[i * step + j] || 0;
        if (v < min) min = v;
        if (v > max) max = v;
      }
      ctx.moveTo(i, mid + min * mid * 0.9);
      ctx.lineTo(i, mid + max * mid * 0.9);
    }
    ctx.stroke();
    audioCtx.close();
  }

  /* ── Progress ── */
  function startProgress() {
    cancelAnimationFrame(animFrame);
    function tick() {
      if (audioEl.paused || audioEl.ended) {
        if (audioEl.ended) {
          document.getElementById('playBtn').textContent = '▶';
          document.getElementById('waveOverlay').style.width = '0%';
          document.getElementById('seekBar').value = 0;
          document.getElementById('timeCurrent').textContent = '0:00';
        }
        return;
      }
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      document.getElementById('waveOverlay').style.width = pct + '%';
      document.getElementById('seekBar').value = audioEl.currentTime;
      document.getElementById('timeCurrent').textContent = fmt(audioEl.currentTime);
      animFrame = requestAnimationFrame(tick);
    }
    animFrame = requestAnimationFrame(tick);
  }

  /* ── Player controls ── */
  function togglePlay() {
    if (!currentUrl) return;
    const btn = document.getElementById('playBtn');
    if (audioEl.paused) {
      audioEl.play();
      btn.textContent = '⏸';
      startProgress();
    } else {
      audioEl.pause();
      btn.textContent = '▶';
    }
  }

  audioEl.addEventListener('play', () => {
    document.getElementById('playBtn').textContent = '⏸';
    startProgress();
  });
  audioEl.addEventListener('pause', () => {
    document.getElementById('playBtn').textContent = '▶';
  });

  function seek(delta) {
    if (!currentUrl) return;
    audioEl.currentTime = Math.max(0, Math.min(audioEl.duration, audioEl.currentTime + delta));
  }

  function onSeek(val) {
    if (!currentUrl) return;
    audioEl.currentTime = +val;
  }

  /* ── Download ── */
  function downloadAudio() {
    if (!currentBlob) return;
    const a = document.createElement('a');
    a.href = currentUrl;
    a.download = 'piper_speech.wav';
    a.click();
  }

  /* ── Status ── */
  function setStatus(msg, type = '') {
    const el = document.getElementById('statusBar');
    el.innerHTML = msg;
    el.className = 'status-bar ' + type;
  }

  /* ── Keyboard shortcut ── */
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); synthesize(); }
  });

  updateCharCount();
</script>
</body>
</html>
