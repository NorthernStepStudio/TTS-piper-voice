<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Piper TTS Studio</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --surface3: #22222f;
      --border: #2a2a3a;
      --border2: #363648;
      --accent: #7c5cfc;
      --accent2: #9f82ff;
      --accent-glow: rgba(124, 92, 252, 0.25);
      --green: #22d3a5;
      --green-dim: rgba(34, 211, 165, 0.15);
      --red: #f87171;
      --text: #e8e8f0;
      --text2: #9090aa;
      --text3: #5a5a72;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      padding-bottom: calc(3rem + env(safe-area-inset-bottom));
      overscroll-behavior: none;
    }

    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #b084ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .logo-text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo-text span { color: var(--accent2); }
    .header-badge {
      font-size: 0.7rem; font-weight: 600;
      background: var(--green-dim);
      border: 1px solid rgba(34,211,165,0.3);
      color: var(--green);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }

    .workspace {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
    }
    .card-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text3);
      margin-bottom: 0.9rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .card-title .side { margin-left: auto; }

    /* Voice grid */
    .voice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.55rem;
    }
    .voice-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface2);
      user-select: none;
      touch-action: manipulation;
    }
    .voice-card:hover { border-color: var(--accent2); background: var(--surface3); }
    .voice-card.selected {
      border-color: var(--accent);
      background: rgba(124,92,252,0.1);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .voice-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .voice-meta {
      font-size: 0.7rem; color: var(--text3);
      margin-top: 0.15rem;
      display: flex; gap: 0.4rem; align-items: center;
    }
    .gender-dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0;
    }
    .gender-dot.female { background: #f472b6; }
    .gender-dot.male { background: #60a5fa; }

    /* Text area */
    .text-area-wrap { position: relative; }
    textarea {
      width: 100%; min-height: 150px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 16px; line-height: 1.65;
      padding: 0.9rem 1rem;
      resize: vertical; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .char-count {
      position: absolute; bottom: 0.55rem; right: 0.75rem;
      font-size: 0.72rem; color: var(--text3); pointer-events: none;
    }
    .quick-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.7rem; }
    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 0.75rem; padding: 0.38rem 0.8rem;
      border-radius: 999px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
      touch-action: manipulation;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--surface3); }

    /* Controls */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1.1rem 1.6rem;
    }
    @media (max-width: 600px) { .controls-grid { grid-template-columns: 1fr; } }

    .control-item label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; font-weight: 600; color: var(--text2);
      margin-bottom: 0.45rem;
    }
    .control-item label .val {
      font-size: 0.75rem; font-weight: 700; color: var(--accent2);
      background: var(--surface3); border: 1px solid var(--border2);
      padding: 0.08rem 0.45rem; border-radius: 4px;
      min-width: 2.8rem; text-align: center;
    }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: var(--border2); border-radius: 999px;
      outline: none; cursor: pointer;
      touch-action: pan-x;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 15px; height: 15px;
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow); cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
    }
    .control-hint { font-size: 0.67rem; color: var(--text3); margin-top: 0.3rem; }
    .reset-link {
      font-size: 0.68rem; color: var(--text3);
      cursor: pointer; text-decoration: underline dotted;
    }
    .reset-link:hover { color: var(--text2); }

    /* Actions */
    .action-bar { display: flex; gap: 0.75rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      font-size: 0.9rem; font-weight: 600;
      padding: 0.72rem 1.4rem;
      border-radius: var(--radius-sm); border: none;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
      font-family: inherit;
      touch-action: manipulation;
      -webkit-appearance: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9a72ff);
      color: #fff; flex: 1;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.12);
      box-shadow: 0 6px 28px var(--accent-glow);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { background: var(--surface3); color: var(--text3); box-shadow: none; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface2); color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--surface3); color: var(--text); border-color: var(--accent); }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-green {
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(34,211,165,0.3);
    }
    .btn-green:hover { background: rgba(34,211,165,0.22); border-color: var(--green); }

    /* Status */
    .status-bar {
      text-align: center; font-size: 0.8rem; color: var(--text3);
      padding: 0.4rem; min-height: 1.4rem;
    }
    .status-bar.loading { color: var(--accent2); }
    .status-bar.error { color: var(--red); }
    .status-bar.ok { color: var(--green); }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.35rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Player */
    .player-card { display: none; }
    .player-card.visible { display: block; }
    .player-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .player-label {
      font-size: 0.78rem; font-weight: 700; color: var(--green);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .player-label::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .player-meta { font-size: 0.7rem; color: var(--text3); margin-top: 0.2rem; }

    .waveform-wrap {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
      margin-bottom: 1rem; position: relative; height: 68px;
    }
    canvas#waveform { display: block; width: 100%; height: 100%; }
    .waveform-overlay {
      position: absolute; top: 0; left: 0; width: 0%; height: 100%;
      background: rgba(124,92,252,0.08);
      border-right: 2px solid var(--accent);
      pointer-events: none;
    }

    .player-controls { display: flex; align-items: center; gap: 0.9rem; }
    .ctrl-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; transition: all 0.15s;
      touch-action: manipulation;
      -webkit-appearance: none;
    }
    .ctrl-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--accent2); }
    .ctrl-btn.play-btn {
      width: 46px; height: 46px;
      background: var(--accent); border: none;
      color: #fff; font-size: 1rem;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .ctrl-btn.play-btn:hover { filter: brightness(1.15); }
    .time-bar { flex: 1; display: flex; flex-direction: column; gap: 0.3rem; }
    .time-labels {
      display: flex; justify-content: space-between;
      font-size: 0.68rem; color: var(--text3);
      font-variant-numeric: tabular-nums;
    }
    input[type=range].seek { height: 3px; cursor: pointer; }
    input[type=range].seek::-webkit-slider-thumb { width: 11px; height: 11px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎙</div>
    <div class="logo-text">Piper <span>TTS</span> Studio</div>
  </div>
  <span class="header-badge">✦ Neural Voices</span>
</header>

<div class="workspace">

  <!-- Voice picker -->
  <div class="card">
    <div class="card-title">Choose Voice</div>
    <div class="voice-grid" id="voiceGrid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Text input -->
  <div class="card">
    <div class="card-title">Text to Speak</div>
    <div class="text-area-wrap">
      <textarea id="textInput"
        placeholder="Type or paste your text here… (Ctrl+Enter to synthesize)"
        oninput="updateCharCount()"></textarea>
      <span class="char-count" id="charCount">0</span>
    </div>
    <div class="quick-wrap">
      <button class="quick-btn" onclick="setPhrase('Hello! Welcome to Piper TTS Studio. I can speak naturally like a real person.')">👋 Welcome</button>
      <button class="quick-btn" onclick="setPhrase('The quick brown fox jumps over the lazy dog.')">🦊 Pangram</button>
      <button class="quick-btn" onclick="setPhrase('To be, or not to be, that is the question.')">📖 Shakespeare</button>
      <button class="quick-btn" onclick="setPhrase('Hey, did you hear about the new coffee shop that opened downtown? I heard their lattes are incredible.')">☕ Casual</button>
      <button class="quick-btn" onclick="setPhrase('Good morning! Today is going to be a fantastic day. I can feel it.')">🌅 Morning</button>
    </div>
  </div>

  <!-- Voice controls -->
  <div class="card">
    <div class="card-title">
      Voice Controls
      <span class="side"><span class="reset-link" onclick="resetControls()">reset all</span></span>
    </div>
    <div class="controls-grid">

      <div class="control-item">
        <label>
          🐢 Speed
          <span class="val" id="rateVal">+0%</span>
        </label>
        <input type="range" id="rate" min="-50" max="100" step="5" value="0"
          oninput="document.getElementById('rateVal').textContent = fmtPct(+this.value)" />
        <div class="control-hint">−50% slower · +100% faster</div>
      </div>

      <div class="control-item">
        <label>
          🎵 Pitch
          <span class="val" id="pitchVal">+0 Hz</span>
        </label>
        <input type="range" id="pitch" min="-20" max="20" step="1" value="0"
          oninput="document.getElementById('pitchVal').textContent = fmtHz(+this.value)" />
        <div class="control-hint">−20 Hz lower · +20 Hz higher</div>
      </div>

      <div class="control-item">
        <label>
          🔊 Volume
          <span class="val" id="volVal">+0%</span>
        </label>
        <input type="range" id="volume" min="-50" max="50" step="5" value="0"
          oninput="document.getElementById('volVal').textContent = fmtPct(+this.value)" />
        <div class="control-hint">−50% quieter · +50% louder</div>
      </div>

    </div>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn btn-primary" id="synthBtn" onclick="synthesize()">
      🎙 Synthesize Speech
    </button>
    <button class="btn btn-secondary" id="regenBtn" style="display:none" onclick="synthesize()">
      🔄 Regenerate
    </button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <!-- Player -->
  <div class="card player-card" id="playerCard">
    <div class="player-top">
      <div>
        <div class="player-label">Audio Ready</div>
        <div class="player-meta" id="playerMeta">—</div>
      </div>
      <button class="btn btn-green" onclick="downloadAudio()">⬇ Download MP3</button>
    </div>

    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
      <div class="waveform-overlay" id="waveOverlay"></div>
    </div>

    <div class="player-controls">
      <button class="ctrl-btn" onclick="seek(-5)" title="−5s">⏮</button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="seek(5)" title="+5s">⏭</button>
      <div class="time-bar">
        <input type="range" class="seek" id="seekBar" min="0" max="100" value="0"
          oninput="onSeek(this.value)" />
        <div class="time-labels">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>
    </div>
  </div>

</div>

<audio id="audioEl" style="display:none"></audio>

<script>
  /* ── Voice data from server ── */
  const VOICES = {{ voices|tojson }};
  let selectedVoice = VOICES[0].id;
  let currentBlob = null, currentUrl = null, animFrame = null;
  const audioEl = document.getElementById('audioEl');

  /* ── Build voice grid ── */
  function buildVoiceGrid() {
    const grid = document.getElementById('voiceGrid');
    grid.innerHTML = '';
    VOICES.forEach(v => {
      const card = document.createElement('div');
      card.className = 'voice-card' + (v.id === selectedVoice ? ' selected' : '');
      card.dataset.id = v.id;
      card.innerHTML = `
        <div class="voice-name">${v.name}</div>
        <div class="voice-meta">
          <span class="gender-dot ${v.gender.toLowerCase()}"></span>
          ${v.gender} · ${v.style}
        </div>`;
      card.addEventListener('click', () => selectVoice(v.id));
      grid.appendChild(card);
    });
  }

  function selectVoice(id) {
    selectedVoice = id;
    document.querySelectorAll('.voice-card').forEach(c => {
      c.classList.toggle('selected', c.dataset.id === id);
    });
  }

  /* ── Helpers ── */
  function fmtPct(v) { return (v >= 0 ? '+' : '') + v + '%'; }
  function fmtHz(v)  { return (v >= 0 ? '+' : '') + v + ' Hz'; }
  function fmtTime(s) {
    if (!isFinite(s)) return '0:00';
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  }

  function updateCharCount() {
    document.getElementById('charCount').textContent =
      document.getElementById('textInput').value.length;
  }

  function setPhrase(text) {
    document.getElementById('textInput').value = text;
    updateCharCount();
  }

  function resetControls() {
    [['rate','rateVal',fmtPct,0],['pitch','pitchVal',fmtHz,0],['volume','volVal',fmtPct,0]]
      .forEach(([id, labelId, fmt, def]) => {
        document.getElementById(id).value = def;
        document.getElementById(labelId).textContent = fmt(def);
      });
  }

  /* ── Synthesize ── */
  async function synthesize() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) { setStatus('Please enter some text first.', 'error'); return; }

    const synthBtn = document.getElementById('synthBtn');
    const regenBtn = document.getElementById('regenBtn');
    synthBtn.disabled = true;
    regenBtn.disabled = true;
    setStatus('<span class="spinner"></span>Generating speech…', 'loading');
    document.getElementById('playerCard').classList.remove('visible');

    const payload = {
      text,
      voice: selectedVoice,
      rate:   +document.getElementById('rate').value,
      pitch:  +document.getElementById('pitch').value,
      volume: +document.getElementById('volume').value,
    };

    try {
      const t0 = Date.now();
      const res = await fetch('/synthesize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }

      const blob = await res.blob();
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

      if (currentUrl) URL.revokeObjectURL(currentUrl);
      currentBlob = blob;
      currentUrl = URL.createObjectURL(blob);

      audioEl.src = currentUrl;
      await new Promise(r => { audioEl.onloadedmetadata = r; audioEl.load(); });

      setupPlayer(elapsed);
      audioEl.play();
      setStatus(`Ready in ${elapsed}s`, 'ok');
      regenBtn.style.display = '';

    } catch(e) {
      setStatus('Error: ' + e.message, 'error');
    } finally {
      synthBtn.disabled = false;
      regenBtn.disabled = false;
    }
  }

  /* ── Player ── */
  function setupPlayer(elapsed) {
    document.getElementById('playerCard').classList.add('visible');
    const dur = audioEl.duration;
    document.getElementById('timeDuration').textContent = fmtTime(dur);
    document.getElementById('seekBar').max = isFinite(dur) ? dur : 100;
    const voice = VOICES.find(v => v.id === selectedVoice);
    document.getElementById('playerMeta').textContent =
      `${voice ? voice.name + ' · ' : ''}Duration: ${fmtTime(dur)} · Generated in ${elapsed}s`;
    drawWaveform();
    startProgress();
  }

  async function drawWaveform() {
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    canvas.width  = canvas.offsetWidth  * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;

    try {
      const ab = await currentBlob.arrayBuffer();
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const decoded = await ac.decodeAudioData(ab);
      const data = decoded.getChannelData(0);
      const w = canvas.width, h = canvas.height;
      const step = Math.ceil(data.length / w);
      const mid = h / 2;

      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle = 'rgba(124,92,252,0.65)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < w; i++) {
        let mn = 1, mx = -1;
        for (let j = 0; j < step; j++) {
          const v = data[i*step+j]||0;
          if (v<mn) mn=v; if (v>mx) mx=v;
        }
        ctx.moveTo(i, mid+mn*mid*0.88);
        ctx.lineTo(i, mid+mx*mid*0.88);
      }
      ctx.stroke();
      ac.close();
    } catch(_) {}
  }

  function startProgress() {
    cancelAnimationFrame(animFrame);
    function tick() {
      if (audioEl.paused || audioEl.ended) {
        if (audioEl.ended) {
          document.getElementById('playBtn').textContent = '▶';
          document.getElementById('waveOverlay').style.width = '0%';
          document.getElementById('seekBar').value = 0;
          document.getElementById('timeCurrent').textContent = '0:00';
        }
        return;
      }
      const pct = (audioEl.currentTime / audioEl.duration) * 100;
      document.getElementById('waveOverlay').style.width = pct + '%';
      document.getElementById('seekBar').value = audioEl.currentTime;
      document.getElementById('timeCurrent').textContent = fmtTime(audioEl.currentTime);
      animFrame = requestAnimationFrame(tick);
    }
    animFrame = requestAnimationFrame(tick);
  }

  function togglePlay() {
    if (!currentUrl) return;
    const btn = document.getElementById('playBtn');
    if (audioEl.paused) { audioEl.play(); btn.textContent = '⏸'; startProgress(); }
    else { audioEl.pause(); btn.textContent = '▶'; }
  }

  audioEl.addEventListener('play',  () => { document.getElementById('playBtn').textContent = '⏸'; startProgress(); });
  audioEl.addEventListener('pause', () => { document.getElementById('playBtn').textContent = '▶'; });

  function seek(delta) {
    if (!currentUrl) return;
    audioEl.currentTime = Math.max(0, Math.min(audioEl.duration, audioEl.currentTime + delta));
  }
  function onSeek(val) { if (currentUrl) audioEl.currentTime = +val; }

  function downloadAudio() {
    if (!currentBlob) return;
    const a = document.createElement('a'); a.href = currentUrl; a.download = 'speech.mp3'; a.click();
  }

  function setStatus(msg, type='') {
    const el = document.getElementById('statusBar');
    el.innerHTML = msg; el.className = 'status-bar ' + type;
  }

  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); synthesize(); }
  });

  buildVoiceGrid();
  updateCharCount();
</script>
